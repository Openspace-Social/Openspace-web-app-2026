[build]
  command = "npm run build:web"
  publish = "dist"

# Build-time environment variables baked into the web bundle. These match
# the testflight EAS profile so staging.openspace.social/api/* calls hit
# the Netlify proxy below, which forwards to the Django API on EB. For prod
# you'll override in the Netlify dashboard (or use a separate netlify.toml
# branch) — set EXPO_PUBLIC_API_BASE_URL=https://openspace.social there.
[build.environment]
  EXPO_PUBLIC_API_BASE_URL = "https://staging.openspace.social"
  EXPO_PUBLIC_GIPHY_KEY = "ySpehlbqPIWtFFkeEk7TdKiMuaj6cONU"
  EXPO_PUBLIC_GOOGLE_CLIENT_ID = "767950302419-reisjv6d4veo5sh5t57i69jrr101fr8u.apps.googleusercontent.com"
  EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID = "767950302419-sujekkd6pcq8lhnc5sqd5leohjt8hav8.apps.googleusercontent.com"
  EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID = "767950302419-r4l1balbmusajnp6cape3anmt8bu2oie.apps.googleusercontent.com"
  EXPO_PUBLIC_APPLE_CLIENT_ID = "openspace.web-authentication"

# Apple requires apple-app-site-association to be served as application/json
# with no Content-Disposition header that would force a download. We declare
# both files explicitly so the SPA fallback below cannot intercept them and
# so Netlify doesn't auto-pick the wrong content type for an extensionless
# file. Same file content works for staging.openspace.social and
# (eventually) the production openspace.social custom domain.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# Proxy /api/* through to the staging Django API on Elastic Beanstalk so the
# React Native + RN-Web app can keep calling https://staging.openspace.social/api/...
# (the URL baked into the TestFlight build via EXPO_PUBLIC_API_BASE_URL) even
# now that staging.openspace.social is the Netlify-served React app. status=200
# is a true rewrite — the browser/app sees the response as if it came from
# staging.openspace.social directly.
#
# This matches the long-term prod shape where openspace.social will serve the
# React app and api.openspace.social will be the API: staging now mirrors that
# split conceptually (web on the apex, API behind a /api/ prefix proxy).
[[redirects]]
  from = "/api/*"
  to = "https://staging-api.openspace.social/api/:splat"
  status = 200
  force = true

# Same proxy for the federation/health endpoints if any clients hit them.
[[redirects]]
  from = "/health/*"
  to = "https://staging-api.openspace.social/health/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/webfinger"
  to = "https://staging-api.openspace.social/.well-known/webfinger"
  status = 200
  force = true

# SPA fallback. The static files + proxies above match before this rule
# fires, so /.well-known/apple-app-site-association, /api/*, etc. are
# routed correctly and the SPA fallback only applies to actual app routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
